name: groove-oracle
version: 0.2.0
description: >
  Groovium Proof-of-Support Oracle. Calculates a GRVM reputation
  score (Groove Score) from on-platform engagement + external signals
  and anchors a SHA-256 proof on Solana Devnet via the Memo Program.

triggers:
  - type: http
    method: POST
    auth: supabase-jwt

steps:
  - id: fetch-metrics
    uses: supabase.rpc
    with:
      function: compute_engagement_metrics
      params: { _uid: "{{ input.user_id }}" }

  - id: fetch-external
    uses: http.parallel
    with:
      requests:
        - https://api.coingecko.com/api/v3/simple/price?ids=ethereum,chainlink&vs_currencies=usd&include_24hr_change=true
        - https://api.coingecko.com/api/v3/search/trending
        - https://musicbrainz.org/ws/2/artist/?query=tag:electronic&fmt=json&limit=1
    fallback: skip

  - id: groove-score
    uses: js
    script: ./oracle/score.js

  - id: ai-insight
    uses: lovable-ai
    with:
      model: google/gemini-3-flash-preview
      prompt-file: ./prompts/groove-oracle.system.md
      response_format: json_object

  - id: solana-proof
    uses: js
    script: ./oracle/solana-proof.js
    with:
      cluster: devnet
      memo:
        g: groovium-cre
        h: "{{ steps.groove-score.output.oracle_hash }}"
        s: "{{ steps.groove-score.output.score }}"
        r: "{{ steps.ai-insight.output.rank }}"

  - id: persist
    uses: supabase.rpc
    with:
      function: record_oracle_sync
      params:
        _uid: "{{ input.user_id }}"
        _score: "{{ steps.groove-score.output.score }}"
        _insight: "{{ steps.ai-insight.output.insight }}"
        _profile: "{{ steps.ai-insight.output.profile }}"
        _rank: "{{ steps.ai-insight.output.rank }}"
        _tx_hash: "{{ steps.solana-proof.output.signature }}"
        _slot: "{{ steps.solana-proof.output.slot }}"
        _explorer_url: "{{ steps.solana-proof.output.explorer_url }}"
        _oracle_hash: "{{ steps.groove-score.output.oracle_hash }}"
        _chain: solana-devnet

outputs:
  groove_score: "{{ steps.groove-score.output.score }}"
  rank: "{{ steps.ai-insight.output.rank }}"
  tx_signature: "{{ steps.solana-proof.output.signature }}"
  explorer_url: "{{ steps.solana-proof.output.explorer_url }}"
